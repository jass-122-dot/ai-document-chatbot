<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc Chatbot - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/dashboard.css') }}"
    />
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>DocChat AI</h2>
            <p id="username"></p>
        </div>
        <ul>
            <li><a href="/dashboard" class="active">My Documents</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <h1>My Documents</h1>
            <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Upload PDF</button>
            <input type="file" id="fileInput" accept=".pdf" style="display:none">
        </div>
        <div id="upload-status" class="upload-status"></div>
        <div id="docs-grid" class="docs-grid"></div>
    </div>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
</body>
</html>
